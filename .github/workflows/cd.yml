name: Release

# Manual, one-shot gem release. Trigger from the Actions tab and enter
# the new semver version (e.g. 0.3.3). The reusable workflow runs the
# test suite, bumps lib/flaky/version.rb + Gemfile.lock, commits to main,
# tags v<version>, and creates a GitHub Release. The publish workflow
# (publish.yml) then pushes the gem to RubyGems.
#
# Note: this repo's gem is published as `flaky-friend` on RubyGems
# (per `spec.name` in flaky.gemspec). The `gem_name: flaky` input
# below is what the reusable workflows use to locate the gemspec file
# and the `lib/flaky/` version directory.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, e.g. 0.3.3"
        required: true
        type: string

jobs:
  release:
    uses: flytedesk/.github/.github/workflows/reusable-ruby-gem-release.yml@main
    with:
      version: ${{ inputs.version }}
      gem_name: flaky
    secrets: inherit
